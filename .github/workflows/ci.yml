name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

  integration:
    runs-on: ubuntu-latest
    needs: lint
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository

    env:
      NODE_ENV: test
      MONGO_URI: ${{ secrets.MONGO_URI }}
      MONGO_URI_TEST: ${{ secrets.MONGO_URI_TEST }}
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      WEBHOOK_SECRET_KEY: ${{ secrets.WEBHOOK_SECRET_KEY }}
      API_KEY_SALT: ${{ secrets.API_KEY_SALT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Validate required secrets
        run: |
          if [[ -z "$WEBHOOK_SECRET_KEY" ]]; then
            echo "ERROR: WEBHOOK_SECRET_KEY is not set"
            exit 1
          fi
          if ! [[ "$WEBHOOK_SECRET_KEY" =~ ^[0-9a-fA-F]{64}$ ]]; then
            echo "ERROR: WEBHOOK_SECRET_KEY must be exactly 64 hex characters"
            exit 1
          fi

      - name: Run tests
        run: npm test
