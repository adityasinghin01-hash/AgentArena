# render.yaml
# Infrastructure-as-Code for Render deployment.

services:
  - type: web
    name: agentarena-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: API_KEY_SALT
        sync: false
      - key: WEBHOOK_SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: groq
      - key: SEED_USER_ID
        sync: false
